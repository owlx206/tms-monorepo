name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build backend and frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            tms-backend/package-lock.json
            tms-frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: tms-backend

      - name: Build backend
        run: npm run build
        working-directory: tms-backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tms-frontend

      - name: Build frontend
        run: npm run build
        working-directory: tms-frontend
