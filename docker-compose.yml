services:
  tms-backend:
    build: ./tms-backend
    restart: always
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT}
      - HOST=${BACKEND_HOST}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_ENCRYPT=${DB_ENCRYPT}
      - DB_TRUST_SERVER_CERTIFICATE=${DB_TRUST_SERVER_CERTIFICATE}
      - DB_SYNCHRONIZE=${DB_SYNCHRONIZE}
      - DB_DROP_SCHEMA=${DB_DROP_SCHEMA}
      - AUTH_ALLOW_PUBLIC_REGISTRATION=${AUTH_ALLOW_PUBLIC_REGISTRATION}
      - SYSADMIN_USERNAME=${SYSADMIN_USERNAME}
      - SYSADMIN_PASSWORD=${SYSADMIN_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - TZ=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      - VOICE_ATTENDANCE_SYNC_ENABLED=${VOICE_ATTENDANCE_SYNC_ENABLED:-true}
      - VOICE_ATTENDANCE_SYNC_INTERVAL_SECONDS=${VOICE_ATTENDANCE_SYNC_INTERVAL_SECONDS:-15}
      - SESSION_STATUS_SYNC_ENABLED=${SESSION_STATUS_SYNC_ENABLED:-true}
      - SESSION_STATUS_SYNC_INTERVAL_SECONDS=${SESSION_STATUS_SYNC_INTERVAL_SECONDS:-15}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./tms-backend:/usr/app/
      - /usr/app/node_modules
    networks:
      - tms-network
    command: sh -c "npm install && npm run dev"

  tms-frontend:
    build: ./tms-frontend
    restart: always
    environment:
      - PORT=${FRONTEND_PORT}
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./tms-frontend:/usr/app/
      - /usr/app/node_modules
    networks:
      - tms-network
    command: npm run dev

networks:
  tms-network:
