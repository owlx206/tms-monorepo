services:
  tms-backend:
    build: ./tms-backend
    restart: always
    depends_on:
      - database
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT}
      - HOST=${BACKEND_HOST}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SYNCHRONIZE=${DB_SYNCHRONIZE}
      - DB_DROP_SCHEMA=${DB_DROP_SCHEMA}
      - AUTH_ALLOW_PUBLIC_REGISTRATION=${AUTH_ALLOW_PUBLIC_REGISTRATION}
      - SYSADMIN_USERNAME=${SYSADMIN_USERNAME}
      - SYSADMIN_PASSWORD=${SYSADMIN_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - TZ=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      - VOICE_ATTENDANCE_SYNC_ENABLED=${VOICE_ATTENDANCE_SYNC_ENABLED:-true}
      - VOICE_ATTENDANCE_SYNC_INTERVAL_SECONDS=${VOICE_ATTENDANCE_SYNC_INTERVAL_SECONDS:-15}
      - SESSION_STATUS_SYNC_ENABLED=${SESSION_STATUS_SYNC_ENABLED:-true}
      - SESSION_STATUS_SYNC_INTERVAL_SECONDS=${SESSION_STATUS_SYNC_INTERVAL_SECONDS:-15}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./tms-backend:/usr/app/
      - /usr/app/node_modules
    networks:
      - tms-network
    command: sh -c "npm install && npm run dev"

  database:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/18/docker
      - TZ=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      - PGTZ=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
    command: postgres -c timezone=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
    ports:
      - "${POSTGRES_PORT}:${DB_PORT}"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - tms-network

  tms-frontend:
    build: ./tms-frontend
    restart: always
    env_file:
      - .env
    environment:
      - PORT=${FRONTEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./tms-frontend:/usr/app/
      - /usr/app/node_modules
    networks:
      - tms-network
    command: npm run dev

networks:
  tms-network:
